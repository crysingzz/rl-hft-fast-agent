name: Lint & Type Check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check ."
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ."

  pyrefly:
    name: Pyrefly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyrefly
      - run: pyrefly check
